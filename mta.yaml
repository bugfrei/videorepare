---
_schema-version: 3.3.0
ID: vidprep
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: vidprep-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: vidprep-db
      - name: vidprep-auth
      - name: vidprep-destination

  - name: vidprep-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: vidprep-db

  - name: vidprep-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: vidprep-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - name: vidprepvpele
          artifacts:
            - vpele.zip
          target-path: app/
        - name: vidprepvpui5
          artifacts:
            - vpui5.zip
          target-path: app/

  - name: vidprepvpele
    type: html5
    path: app/vpele
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: vidprepvpui5
    type: html5
    path: app/vpui5
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: vidprep-destinations
    type: com.sap.application.content
    requires:
      - name: vidprep-auth
        parameters:
          service-key:
            name: vidprep-auth-key
      - name: vidprep-html5-repo-host
        parameters:
          service-key:
            name: vidprep-html5-repo-host-key
      - name: srv-api
      - name: vidprep-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: vidprep-html5-repository
              ServiceInstanceName: vidprep-html5-repo-host
              ServiceKeyName: vidprep-html5-repo-host-key
              sap.cloud.service: vidprep.service
            - Name: vidprep-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: vidprep-auth
              ServiceKeyName: vidprep-auth-key
              sap.cloud.service: vidprep.service

  - name: vidprep
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: vidprep-auth
      - name: vidprep-destination
      - name: vidprep-html5-runtime

resources:
  - name: vidprep-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: vidprep-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: vidprep-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: vidprep-${org}-${space}
        tenant-mode: dedicated
  - name: vidprep-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: vidprep-srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
              - Name: ui5
                URL: https://ui5.sap.com
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
  - name: vidprep-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
