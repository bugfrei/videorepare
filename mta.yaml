_schema-version: 3.3.0
ID: vidprep
description: A simple CAP project.
version: 1.0.0
modules:
- name: vidprep-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: vidprep-db
  - name: vidprep-auth
  - name: vidprep-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    readiness-health-check-http-endpoint: /health
    readiness-health-check-type: http
  build-parameters:
    builder: npm
- name: vidprep-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: vidprep-db
  parameters:
    buildpack: nodejs_buildpack
- name: vidprep-app-deployer
  type: com.sap.application.content
  path: gen
  requires:
  - name: vidprep-html5-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: app/
    requires:
    - artifacts:
      - vpele.zip
      name: vidprepvpele
      target-path: app/
    - artifacts:
      - vpui5.zip
      name: vidprepvpui5
      target-path: app/
    - artifacts:
      - vpadmin.zip
      name: vpadmin
      target-path: app//
- name: vidprepvpele
  type: html5
  path: app/vpele
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm ci
    - npm run build
    supported-platforms: []
- name: vidprepvpui5
  type: html5
  path: app/vpui5
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm ci
    - npm run build
    supported-platforms: []
- name: vidprep-destinations
  type: com.sap.application.content
  requires:
  - name: vidprep-auth
    parameters:
      service-key:
        name: vidprep-auth-key
  - name: vidprep-html5-repo-host
    parameters:
      service-key:
        name: vidprep-html5-repo-host-key
  - name: srv-api
  - name: vidprep-destination
    parameters:
      content-target: true
  parameters:
    content:
      instance:
        destinations:
        - Name: vidprep-html5-repository
          ServiceInstanceName: vidprep-html5-repo-host
          ServiceKeyName: vidprep-html5-repo-host-key
          sap.cloud.service: vidprep.service
        - Authentication: OAuth2UserTokenExchange
          Name: vidprep-auth
          ServiceInstanceName: vidprep-auth
          ServiceKeyName: vidprep-auth-key
          sap.cloud.service: vidprep.service
        existing_destinations_policy: update
  build-parameters:
    no-source: true
- name: vidprep
  type: approuter.nodejs
  path: app/router
  requires:
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  - name: vidprep-auth
  - name: vidprep-destination
  - name: vidprep-html5-runtime
  parameters:
    disk-quota: 256M
    keep-existing-routes: true
    memory: 256M
- name: vpadmin
  type: html5
  path: app/vpadmin
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: vidprep-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: vidprep-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host
- name: vidprep-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      tenant-mode: dedicated
      xsappname: vidprep-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: vidprep-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: vidprep-srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite
  requires:
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
- name: vidprep-html5-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-runtime
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
